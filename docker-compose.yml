version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: wealthhub-db
    restart: always
    environment:
      POSTGRES_DB: wealthhub
      POSTGRES_USER: wealth_user
      POSTGRES_PASSWORD: wealth_secure_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wealthhub-backend
    restart: always
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - PORT=5000
      - DATABASE_URL=postgresql://wealth_user:wealth_secure_password@db:5432/wealthhub
      - ENCRYPTION_KEY=12345678901234567890123456789012 # 32-byte key for AES-256
      - SESSION_SECRET=supersecret_session_key_for_wealthhub
      - NODE_ENV=development
      - FRONTEND_URL=http://localhost:3002
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: wealthhub-frontend
    restart: always
    ports:
      - "3002:3000"
    environment:
      - VITE_API_URL=http://localhost:5000
    depends_on:
      - backend

volumes:
  postgres_data:
